    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: url('https://i.postimg.cc/xdqLxxfw/36af8800-0a58-4ae1-adfd-58ac11117ead.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Jost', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .cloud {
            position: fixed;
            background: rgba(255,255,255,0.7);
            border-radius: 1000px;
            filter: blur(6px);
            pointer-events: none;
            z-index: 0;
            animation: floatCloud 25s infinite alternate ease-in-out;
        }
        @keyframes floatCloud {
            0% { transform: translateX(-8%) translateY(0%); }
            100% { transform: translateX(8%) translateY(-4%); }
        }
        .cloud-1 { width: 280px; height: 110px; top: 5%; left: -8%; }
        .cloud-2 { width: 380px; height: 140px; bottom: 8%; right: -10%; animation-duration: 35s; }
        .cloud-3 { width: 220px; height: 90px; top: 22%; right: 5%; animation-duration: 20s; }
        .cloud-4 { width: 320px; height: 120px; bottom: 20%; left: -5%; animation-duration: 40s; }
        .cloud-5 { width: 180px; height: 70px; top: 65%; right: 15%; animation-duration: 28s; }
        .cloud-6 { width: 250px; height: 100px; top: 40%; left: 10%; animation-duration: 32s; }

        .star {
            position: fixed;
            color: rgba(255,255,220,0.8);
            font-size: 1.3rem;
            pointer-events: none;
            animation: twinkle 3s infinite alternate;
            text-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.7); }
            100% { opacity: 0.9; transform: scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 480px;
            width: 100%;
            background: transparent;
            backdrop-filter: none;
            border-radius: 60px;
            padding: 2.5rem 1.8rem;
            text-align: center;
            animation: fadeInUp 0.7s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 0.8rem;
            display: block;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.15);
            border: 3px solid rgba(197, 197, 197, 0.9);
        }

        .initials {
            font-family: 'Allura', 'Great Vibes', cursive;
            font-size: 4.2rem;
            background: linear-gradient(135deg, #ec0000, #000000, #ff8000);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.2rem;
            letter-spacing: 0.02em;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #000000;
            font-weight: 500;
            margin-bottom: 1.5rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
            background: transparent;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin: 1.5rem 0 0.8rem;
        }

        .btn {
            padding: 0.9rem 1.5rem;
            border-radius: 80px;
            font-size: 1.15rem;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 1px solid rgba(0, 0, 0, 0.35);
            letter-spacing: 0.5px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.12);
            color: #000000;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
        }
        
        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(0, 0, 0, 0.6);
            box-shadow: 0 16px 28px rgba(0, 0, 0, 0.2);
        }
        
        .btn:active {
            transform: scale(0.96);
            transition: transform 0.12s;
        }

        .btn-osh, .btn-toy, .btn-choyxona {
            background: rgba(255, 255, 255, 0.12);
            color: #000000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.35);
        }

        .btn-icon {
            font-size: 1.4rem;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
        }

        .footer-text {
            font-size: 0.7rem;
            color: #000000;
            margin-top: 2rem;
            border-top: 1px solid rgba(0,0,0,0.2);
            padding-top: 1.1rem;
            font-weight: 450;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            background: transparent;
        }

        @media (max-width: 520px) {
            .container { padding: 1.6rem 1.2rem; margin: 0 12px; }
            .initials { font-size: 3.4rem; }
            .hero-photo { width: 90px; height: 90px; }
            .btn { font-size: 1rem; padding: 0.7rem 1rem; gap: 8px; }
            .btn-icon { font-size: 1.2rem; }
            .subtitle { font-size: 0.7rem; letter-spacing: 0.3em; }
        }
    </style>
</head>
